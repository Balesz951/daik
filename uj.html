<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diáknyilvántartó - Új diák</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">Diáknyilvántartó</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Kezdőlap</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista.html">Diákok listája</a></li>
                    <li class="nav-item"><a class="nav-link active" href="uj.html">Új diák</a></li>
                    <li class="nav-item"><a class="nav-link" href="modositas.html">Módosítás</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="form-container">
            <h2 class="fw-bold">Új diák felvétele</h2>
            <p class="text-muted small mb-4">1. feladat: reszponzív űrlap + DEMO mentés (adatbázis nélkül)</p>
            
            <form>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Név</label>
                    <input type="text" class="form-control" placeholder="Pl. Kovács Anna">
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Születési év</label>
                        <input type="text" class="form-control" placeholder="Pl. 2007">
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0">
                        <label class="form-label fw-bold small">Osztály</label>
                        <select class="form-select">
                            <option selected>Válasszon osztályt...</option>
                            <option value="9A">9A</option>
                            <option value="10B">10B</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">Település</label>
                    <select class="form-select">
                        <option selected>Válasszon települést...</option>
                        <option value="Budapest">Budapest</option>
                        <option value="Debrecen">Debrecen</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small">Fénykép linkje</label>
                    <input type="text" class="form-control" placeholder="kepek/1.jpg vagy https://...">
                </div>
                
                <button type="submit" class="btn btn-primary w-100">Mentés</button>
            </form>

            <div class="alert alert-info mt-4" role="alert">
                <strong>Megjegyzés:</strong> A mentés itt DEMO jellegű (1. feladat), adatbázis-művelet nincs.
            </div>
        </div>
    </main>

    <script src="bootstrap.bundle.min.js"></script>
</body>
</html>
